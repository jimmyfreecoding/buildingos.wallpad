name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create placeholder assets
        run: |
          python3 - <<'PYEOF'
          import os, base64, re, glob
          PNG = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==')
          JPG = base64.b64decode('/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/wAARC AABAAEDASIAAhEBAxEB/8QAFgABAQEAAAAAAAAAAAAAAAAABgUHCP/EAB8QAAIBBAMBAAAAAAAAAAAAAAECAxEEEiExQf/EABQBAQAAAAAAAAAAAAAAAAAAAAD/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCz0A9oCgADiqAAAAAA/9k=')
          os.makedirs('src/assets/images', exist_ok=True)
          found = set()
          for pattern in ['src/**/*.vue', 'src/**/*.js', 'src/**/*.ts', 'src/**/*.scss', 'src/**/*.css']:
              for f in glob.glob(pattern, recursive=True):
                  try:
                      content = open(f, encoding='utf-8', errors='ignore').read()
                      for m in re.finditer(r'assets/images/([\w\-\.]+\.(?:png|jpg|jpeg|svg|webp))', content):
                          found.add(m.group(1))
                  except Exception:
                      pass
          for name in found:
              path = os.path.join('src/assets/images', name)
              if not os.path.exists(path):
                  ext = os.path.splitext(name)[1].lower()
                  data = JPG if ext in ('.jpg', '.jpeg') else PNG
                  open(path, 'wb').write(data)
                  print(f'placeholder: {path}')
          PYEOF

      - name: Install & Build
        run: npm install --legacy-peer-deps && npm run build

      - name: Zip dist
        run: cd dist && zip -r ../wallpad.zip .

      - name: Login CNB
        run: echo "${{ secrets.CNB_TOKEN }}" | docker login docker.cnb.cool -u ${{ secrets.CNB_USERNAME }} --password-stdin

      - name: Push zip image
        run: |
          printf 'FROM scratch\nADD wallpad.zip /\n' > Dockerfile.zip
          docker build -f Dockerfile.zip \
            -t docker.cnb.cool/geeqee2025/buildingos.img/wallpad-zip:latest .
          docker push docker.cnb.cool/geeqee2025/buildingos.img/wallpad-zip:latest

      - name: Trigger buildingos.ai rebuild
        env:
          GH_TOKEN: ${{ secrets.BUILDINGOS_AI_PAT }}
        run: gh workflow run build-web.yml --repo jimmyfreecoding/buildingos.ai --ref main
